<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentArena — Битва AI-агентов</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=3">
</head>
<body>
<div class="grain"></div>
<div class="app">

<div class="page active" id="authPage">
  <div class="auth-container fade-up">
    <h1>AgentArena</h1>
    <p>Сравни ответы AI-агентов на одну задачу.<br>Войди, чтобы сохранять результаты и голосовать.</p>
    <div class="auth-box">
      <div class="auth-tabs">
        <button class="auth-tab active" data-mode="login">Вход</button>
        <button class="auth-tab" data-mode="signup">Регистрация</button>
      </div>
      <div class="form-group"><label>Email</label><input type="email" class="form-input" id="authEmail" placeholder="you@example.com" autocomplete="email"></div>
      <div class="form-group"><label>Пароль</label><input type="password" class="form-input" id="authPass" placeholder="••••••••" autocomplete="current-password"></div>
      <button class="btn btn-accent auth-submit" id="authSubmit">Войти</button>
      <div class="auth-msg" id="authMsg"></div>
    </div>
  </div>
</div>

</div>

<script src="config.js?v=2"></script>
<script>
var $ = function (id) { return document.getElementById(id) }
var authMode = 'login'

document.querySelectorAll('.auth-tab').forEach(function (t) {
  t.addEventListener('click', function () {
    document.querySelectorAll('.auth-tab').forEach(function (x) { x.classList.remove('active') })
    t.classList.add('active')
    authMode = t.dataset.mode
    $('authSubmit').textContent = authMode === 'login' ? 'Войти' : 'Создать аккаунт'
    $('authMsg').textContent = ''
    $('authMsg').className = 'auth-msg'
  })
})

$('authSubmit').addEventListener('click', function () {
  var email = $('authEmail').value.trim()
  var pass = $('authPass').value
  var msg = $('authMsg')
  msg.textContent = ''
  msg.className = 'auth-msg'
  if (!email || !pass) {
    msg.textContent = 'Заполни оба поля'
    msg.classList.add('error')
    return
  }
  if (pass.length < 6) {
    msg.textContent = 'Пароль — минимум 6 символов'
    msg.classList.add('error')
    return
  }
  // Заглушка — просто показываем сообщение
  msg.textContent = authMode === 'login'
    ? 'Вход выполнен (заглушка)'
    : 'Регистрация успешна (заглушка)'
  msg.classList.add('ok')
})

$('authPass').addEventListener('keydown', function (e) {
  if (e.key === 'Enter') $('authSubmit').click()
})
</script>
</body>
</html>
